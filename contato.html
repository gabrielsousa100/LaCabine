<!-- Dados do Contratante -->
<h4 class="fw-bold mb-4 titulo-form">Dados do Contratante</h4>

<div class="row">
    <div class="col-md-6">
        <label class="form-label fw-medium text-muted">Seu Nome</label>
        <input type="text" class="form-control" id="nome" placeholder="Ex: Maria Silva" required>
    </div>

    <div class="col-md-6">
        <label class="form-label fw-medium text-muted">E-mail</label>
        <input type="email" class="form-control" id="email" placeholder="nome@email.com" required>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <label class="form-label fw-medium text-muted">WhatsApp / Telefone</label>
        <input type="tel" class="form-control" id="telefone" placeholder="(11) 99999-9999" required>
    </div>

    <div class="col-md-6">
        <label class="form-label fw-medium text-muted">CPF ou CNPJ</label>
        <input type="text" class="form-control" id="cpfCnpj" placeholder="000.000.000-00 ou 00.000.000/0000-00"
            required>
        <small id="cpfCnpjMsg" class="text-danger"></small>
    </div>
</div>

<hr class="my-4">

<!-- Dados do Evento -->
<h4 class="fw-bold mb-4 titulo-form">Dados do Evento</h4>

<div class="row">
    <div class="col-md-6">
        <label class="form-label fw-medium text-muted">Data do Evento</label>
        <input type="date" class="form-control" id="dataEvento" required>
    </div>

    <div class="col-md-6">
        <label class="form-label fw-medium text-muted">Tipo de Evento</label>
        <select class="form-select" id="tipoEvento" required>
            <option value="" selected disabled>Selecione...</option>
            <option value="casamento">Casamento</option>
            <option value="corporativo">Evento Corporativo</option>
            <option value="15anos">Debutante / 15 Anos</option>
            <option value="aniversario">Aniversário</option>
            <option value="outro">Outro</option>
        </select>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <label class="form-label fw-medium text-muted">Quantidade de Convidados</label>
        <input type="number" class="form-control" id="convidados" min="1" placeholder="Ex: 150" required>
    </div>

    <div class="col-md-6">
        <label class="form-label fw-medium text-muted">Horas de Evento</label>
        <input type="number" class="form-control" id="horasEvento" min="1" placeholder="Ex: 5" required>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <label class="form-label fw-medium text-muted">Quantidade de Atrações</label>
        <input type="number" class="form-control" id="qtdAtracoes" min="1" placeholder="Ex: 2" required>
    </div>

    <div class="col-md-6">
        <label class="form-label fw-medium text-muted">Atração Principal</label>
        <select class="form-select" id="atracaoPrincipal" required>
            <option value="" selected disabled>Selecione...</option>
            <option value="cabine">Cabine de Fotos Premium</option>
            <option value="espelho">Espelho Retrô Touch</option>
            <option value="plataforma360">Plataforma 360 Video</option>
            <option value="tunelled">Túnel LED Infinito</option>
        </select>
    </div>
</div>

<div class="mb-3">
    <label class="form-label fw-medium text-muted">Local do Evento</label>
    <input type="text" class="form-control" id="localEvento" placeholder="Nome do salão, empresa, chácara, hotel..."
        required>
</div>

<hr class="my-4">

<!-- Endereço -->
<h4 class="fw-bold mb-4 titulo-form">Endereço do Evento</h4>

<div class="row">
    <div class="col-md-4">
        <label class="form-label fw-medium text-muted">CEP</label>
        <input type="text" class="form-control" id="cep" placeholder="00000-000" required>
        <small id="cepMsg" class="text-danger"></small>
    </div>

    <div class="col-md-8">
        <label class="form-label fw-medium text-muted">Rua</label>
        <input type="text" class="form-control" id="rua" required>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <label class="form-label fw-medium text-muted">Número</label>
        <input type="text" class="form-control" id="numero" required>
    </div>

    <div class="col-md-8">
        <label class="form-label fw-medium text-muted">Complemento</label>
        <input type="text" class="form-control" id="complemento" placeholder="Opcional">
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <label class="form-label fw-medium text-muted">Bairro</label>
        <input type="text" class="form-control" id="bairro" required>
    </div>

    <div class="col-md-4">
        <label class="form-label fw-medium text-muted">Cidade</label>
        <input type="text" class="form-control" id="cidade" required>
    </div>

    <div class="col-md-4">
        <label class="form-label fw-medium text-muted">Estado</label>
        <input type="text" class="form-control" id="estado" required>
    </div>
</div>

<div class="mb-4">
    <label class="form-label fw-medium text-muted">
        Mensagem ou Detalhes Adicionais
    </label>
    <textarea class="form-control" id="mensagem" rows="4" placeholder="Conte-nos mais sobre seu evento..."></textarea>
</div>

<button type="submit" class="btn btn-red-pill px-5 py-3 w-100 fw-bold">
    Enviar Solicitação Formal
</button>
