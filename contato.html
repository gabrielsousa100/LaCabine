                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

    <!-- CONTATO -->
    <section class="py-5">

        <div class="container">

            <h2 class="text-center mb-5">
                Entre em Contato
            </h2>

            <div class="row justify-content-center">

                <div class="col-lg-7">

                    <form id="formulario">

                        <div class="mb-3">

                            <input
                            type="text"
                            class="form-control"
                            placeholder="Seu nome">

                        </div>

                        <div class="mb-3">

                            <input
                            type="email"
                            class="form-control"
                            placeholder="Seu e-mail">

                        </div>

                        <div class="mb-3">

                            <textarea
                            class="form-control"
                            rows="5"
                            placeholder="Digite sua mensagem"></textarea>

                        </div>

                        <button class="btn btn-warning w-100">

                            Enviar Mensagem

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </section>
